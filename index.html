<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrera CeviSystems</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; }

    header { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; color: white; z-index: 1000; }
    header a { color: white; text-decoration: none; margin-left: 15px; }

    .hero { height: 100vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1552674605-db6ffd4facb5') no-repeat center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; color: white; }
    .hero h1 { font-size: 3.5rem; font-weight: 700; }
    .hero p { font-size: 1.6rem; margin: 15px 0; }

    .counter { font-size: 2.2rem; margin-bottom: 10px; background: rgba(0,0,0,0.6); padding: 12px 25px; border-radius: 10px; }
    .live { font-size: 1.2rem; margin-bottom: 20px; }

    .btn { background: #ff4d4d; padding: 15px 30px; border-radius: 30px; color: white; text-decoration: none; }

    .section { padding: 80px 20px; text-align: center; background: #f5f5f5; color: #222; }

    .cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .card { background: white; padding: 20px; border-radius: 10px; width: 250px; }

    /* VIDEO CAUSA */
    .cause { position: relative; height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white; overflow: hidden; }
    .cause video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
    .cause::after { content: ''; position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
    .cause-content { position: relative; z-index: 2; max-width: 800px; opacity: 0; transform: translateY(40px); transition: 1s; }
    .cause-content.show { opacity: 1; transform: translateY(0); }

    .progress-bar { width: 100%; background: rgba(255,255,255,0.3); border-radius: 20px; overflow: hidden; margin-top: 15px; }
    .progress-fill { height: 20px; width: 0%; background: #00ff99; }

    /* CARRUSEL */
    .carousel { max-width: 900px; margin: auto; overflow: hidden; }
    .slides { display: flex; transition: transform .5s; }
    .slide { min-width: 100%; }
    .slide iframe { width: 100%; height: 400px; }

    /* FORM */
    .form-section { background: #111; color: white; padding: 80px 20px; text-align: center; }
    form { max-width: 400px; margin: auto; display: flex; flex-direction: column; gap: 10px; }
    input, select { padding: 12px; border-radius: 5px; border: none; }

    @media(max-width:768px){ .hero h1{font-size:2.2rem;} .slide iframe{height:250px;} }
  </style>
</head>
<body>

<header>
  <div><strong>CeviSystems</strong></div>
  <nav>
    <a href="#">Inicio</a>
    <a href="#registro">Registro</a>
  </nav>
</header>

<section class="hero">
  <h1>Carrera CeviSystems 2026</h1>
  <p>¡Corre, disfruta y rompe tus límites!</p>
  <div class="counter" id="counter">0 inscritos</div>
  <div class="live" id="liveInfo">🔥 5 lugares disponibles • ⏳ 12 viendo ahora</div>
  <a href="#registro" class="btn">Inscríbete ahora</a>
</section>

<section class="cause">
  <video autoplay muted loop>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>
  <div class="cause-content" id="causeContent">
    <h2>💛 Corre por quienes más lo necesitan</h2>
    <p>Cada paso cambia vidas.</p>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div id="progressText">$0 recaudados</div>
  </div>
</section>

<section class="section">
  <h2>Experiencias reales</h2>
  <div class="carousel">
    <div class="slides" id="slides">
      <div class="slide"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe></div>
      <div class="slide"><iframe src="https://www.youtube.com/embed/3GwjfUFyY6M"></iframe></div>
      <div class="slide"><iframe src="https://www.youtube.com/embed/V-_O7nl0Ii0"></iframe></div>
    </div>
  </div>
</section>

<section class="form-section" id="registro">
  <h2>Registro</h2>
  <form>
    <input type="text" placeholder="Nombre completo" required>
    <input type="email" placeholder="Correo" required>
    <select><option>5K</option><option>10K</option></select>
    <button class="btn">Registrarme</button>
  </form>
</section>

<script>
let count=0;setInterval(()=>{count+=Math.floor(Math.random()*3);document.getElementById('counter').innerText=count+' inscritos';},2000);

const observer=new IntersectionObserver(e=>{if(e[0].isIntersecting)document.getElementById('causeContent').classList.add('show');});observer.observe(document.getElementById('causeContent'));

let progress=0,goal=50000;setInterval(()=>{progress+=Math.random()*2000;if(progress>goal)progress=goal;document.getElementById('progressFill').style.width=(progress/goal*100)+'%';document.getElementById('progressText').innerText='$'+Math.floor(progress)+' recaudados';},3000);

let i=0;const slides=document.getElementById('slides');const total=slides.children.length;setInterval(()=>{i=(i+1)%total;slides.style.transform=`translateX(-${i*100}%)`;},4000);
</script>

</body>
</html>
