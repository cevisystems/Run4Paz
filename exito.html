<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Pago exitoso! - RUN4PAZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 2rem;
        }
        .success-card {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 3rem;
            border-radius: var(--border-radius);
            text-align: center;
            box-shadow: var(--shadow-xl);
            animation: fadeInUp 0.6s ease;
        }
        .success-icon {
            font-size: 5rem;
            animation: bounce 0.5s ease;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .success-title {
            color: var(--success);
            margin: 1rem 0;
        }
        .folio-box {
            background: var(--bg-gray);
            padding: 1rem;
            border-radius: var(--border-radius);
            margin: 1.5rem 0;
            font-family: monospace;
            font-size: 1.2rem;
        }
        .countdown {
            margin: 1.5rem 0;
            padding: 1rem;
            background: #fef3c7;
            border-radius: var(--border-radius);
        }
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-card">
            <div class="success-icon">✅</div>
            <h1 class="success-title">¡Pago exitoso!</h1>
            <p>Tu inscripción ha sido confirmada exitosamente.</p>
            
            <div class="folio-box">
                <strong>Tu folio de inscripción:</strong><br>
                <span id="folio-number" style="font-size: 1.5rem; font-weight: 700; color: var(--primary-color);">RUN4PAZ-2025-XXXX</span>
            </div>

            <div class="countdown">
                <p>📧 Se ha enviado un correo con los detalles de tu inscripción</p>
                <p>📱 Revisa tu bandeja de entrada y spam</p>
            </div>

            <div class="action-buttons">
                <a href="panel.html" class="btn-primary" id="view-panel">Ver mi inscripción</a>
                <button class="btn-secondary" onclick="copyFolio()">📋 Copiar folio</button>
                <button class="btn-secondary" onclick="downloadQR()">📱 Descargar QR</button>
            </div>

            <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <p style="font-size: 0.85rem; color: var(--text-light);">
                    ¿Tienes preguntas? Contáctanos al <strong>55 1234 5678</strong> o por WhatsApp
                </p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const folio = urlParams.get('folio') || localStorage.getItem('run4paz_folio');
        const paymentId = urlParams.get('payment_id');
        
        if (folio) {
            document.getElementById('folio-number').textContent = folio;
            localStorage.setItem('run4paz_folio', folio);
        }
        
        function copyFolio() {
            const folio = document.getElementById('folio-number').textContent;
            navigator.clipboard.writeText(folio);
            alert('Folio copiado al portapapeles');
        }
        
        function downloadQR() {
            window.location.href = `panel.html?folio=${folio}`;
        }
        
        // Redirigir después de 5 segundos automáticamente
        setTimeout(() => {
            window.location.href = `panel.html?folio=${folio}`;
        }, 5000);
    </script>
</body>
</html>
