<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - RUN4PAZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0d3b66, #4CAF50);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-card {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo { width: 80px; margin-bottom: 1rem; display: block; margin-left: auto; margin-right: auto; }
        h2 { color: #0d3b66; text-align: center; margin-bottom: 0.5rem; }
        .subtitle { color: #718096; text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .btn-google {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }
        .btn-google:hover { border-color: #0d3b66; background: #f7fafc; }
        .divider {
            margin: 1.5rem 0;
            position: relative;
            text-align: center;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e2e8f0;
        }
        .divider span {
            background: white;
            padding: 0 1rem;
            position: relative;
            color: #a0aec0;
            font-size: 0.85rem;
        }
        .input-group { margin-bottom: 1rem; }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #2d3748;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #0d3b66;
        }
        .btn-primary {
            background: #0d3b66;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-primary:hover { background: #1a5a8c; }
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #718096;
        }
        .login-link a { color: #0d3b66; text-decoration: none; font-weight: 600; }
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.85rem;
        }
        .success-message {
            background: #c6f6d5;
            color: #22543d;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.85rem;
        }
        .password-strength {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .strength-weak { background: #f56565; width: 25%; }
        .strength-medium { background: #ed8936; width: 50%; }
        .strength-strong { background: #48bb78; width: 75%; }
        .strength-very { background: #38a169; width: 100%; }
    </style>
</head>
<body>
    <div class="register-card">
        <img src="images/logo.png" alt="RUN4PAZ" class="logo" onerror="this.src='https://via.placeholder.com/80?text=🏃'">
        <h2>Crear cuenta RUN4PAZ</h2>
        <p class="subtitle">Regístrate para inscribirte en la carrera</p>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <button id="googleRegisterBtn" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20">
            Registrarse con Google
        </button>
        
        <div class="divider">
            <span>o con tu correo</span>
        </div>
        
        <form id="registerForm">
            <div class="input-group">
                <label>Nombre completo *</label>
                <input type="text" id="nombre" required>
            </div>
            <div class="input-group">
                <label>Correo electrónico *</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label>Contraseña *</label>
                <input type="password" id="password" required>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
            </div>
            <div class="input-group">
                <label>Confirmar contraseña *</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn-primary">Registrarme</button>
        </form>
        
        <div class="login-link">
            ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script>
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => successDiv.style.display = 'none', 3000);
        }
        
        // Verificar fuerza de contraseña
        document.getElementById('password').addEventListener('input', (e) => {
            const password = e.target.value;
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            
            const bar = document.getElementById('strengthBar');
            if (strength <= 1) bar.className = 'strength-bar strength-weak';
            else if (strength <= 2) bar.className = 'strength-bar strength-medium';
            else if (strength <= 3) bar.className = 'strength-bar strength-strong';
            else bar.className = 'strength-bar strength-very';
        });
        
        // Registro con email
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showError('Las contraseñas no coinciden');
                return;
            }
            
            if (password.length < 6) {
                showError('La contraseña debe tener al menos 6 caracteres');
                return;
            }
            
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                const user = result.user;
                
                await user.updateProfile({ displayName: nombre });
                await user.sendEmailVerification();
                
                await db.collection('users').doc(user.uid).set({
                    nombre: nombre,
                    email: email,
                    createdAt: new Date(),
                    registroCompleto: false
                });
                
                await auth.signOut();
                
                showSuccess('¡Registro exitoso! Revisa tu correo para verificar tu cuenta.');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (error) {
                console.error('Error:', error);
                if (error.code === 'auth/email-already-in-use') {
                    showError('Este correo ya está registrado');
                } else if (error.code === 'auth/invalid-email') {
                    showError('Correo electrónico inválido');
                } else {
                    showError('Error al registrar. Intenta de nuevo');
                }
            }
        });
        
        // Registro con Google
        document.getElementById('googleRegisterBtn').addEventListener('click', async () => {
            try {
                const result = await auth.signInWithPopup(googleProvider);
                const user = result.user;
                
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (!userDoc.exists) {
                    await db.collection('users').doc(user.uid).set({
                        nombre: user.displayName,
                        email: user.email,
                        foto: user.photoURL,
                        createdAt: new Date(),
                        registroCompleto: true
                    });
                }
                
                window.location.href = 'inscripcion.html';
            } catch (error) {
                console.error('Error:', error);
                showError('Error al registrarse con Google');
            }
        });
    </script>
</body>
</html>
